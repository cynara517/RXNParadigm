      halide_.C1_electrostatic_charge: az:aryl_halide:C1
      halide_.C2_NMR_shift: az:aryl_halide:C2
      halide_.C2_electrostatic_charge: az:aryl_halide:C2
    coverage:
      fixed_atom_count: 2
      descriptor_column_count: 4
      molecode_anchor_summary:
        element_and_index_match: 2
