artifact_id: dft_fixed_role_graphs_v1
description: Feature-ready role graphs whose atom identities are fixed by DFT atom
  labels. MoleCode nodes are attached as structural anchors when available; descriptor
  values are not extracted here.
datasets:
- dataset_key: AZ
  roles:
  - role: amine
    graph_identity_policy: dft_atom_label_is_primary_atom_id
    representative_component_id: az:amine:m0147
    representative_source_smiles: CN
    fixed_atoms:
    - fixed_atom_id: az:amine:C1
      role: amine
      dft_atom_label: C1
      element: C
      atom_index: 1
      descriptor_columns:
      - amine_.C1_NMR_shift
      - amine_.C1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
      likely_site_types: []
      feature_anchor_status: fixed_by_dft_atom_label
      molecode_anchor:
        anchor_status: fixed_to_molecode
        anchor_method: element_and_index_match
        confidence: high
        fixed_molecode_node:
          node_id: azaminem0147_C_1
          component_id: az:amine:m0147
          element: C
          node_index: 1
          display_label: CH3
        candidate_count: 1
    - fixed_atom_id: az:amine:N1
      role: amine
      dft_atom_label: N1
      element: N
      atom_index: 1
      descriptor_columns:
      - amine_.N1_NMR_shift
      - amine_.N1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
      likely_site_types:
      - AMINE_N
      - AMINE_N_H
      feature_anchor_status: fixed_by_dft_atom_label
      molecode_anchor:
        anchor_status: fixed_to_molecode
        anchor_method: element_and_index_match
        confidence: high
        fixed_molecode_node:
          node_id: azaminem0147_N_1
          component_id: az:amine:m0147
          element: N
          node_index: 1
          display_label: NH2
        candidate_count: 1
    fixed_edges:
    - edge_id: fixed_edge:az_amine_C1--az_amine_N1
      source_fixed_atom_id: az:amine:C1
      target_fixed_atom_id: az:amine:N1
      edge_category: COVALENT_BOND
      edge_status: fixed_from_selected_molecode_anchors
      confidence: high
      bond_records:
      - source_molecode_node_id: azaminem0147_C_1
        target_molecode_node_id: azaminem0147_N_1
        source_component_id: az:amine:m0147
        target_component_id: az:amine:m0147
        molecode_operator: '---'
        bond_type: SINGLE
        bond_order: 1.0
        is_aromatic: false
        stereochemistry: null
      bond_types:
      - SINGLE
      bond_orders:
      - 1.0
    descriptor_to_atom:
      amine_.C1_NMR_shift: az:amine:C1
      amine_.C1_electrostatic_charge: az:amine:C1
      amine_.N1_NMR_shift: az:amine:N1
      amine_.N1_electrostatic_charge: az:amine:N1
    coverage:
      fixed_atom_count: 2
      descriptor_column_count: 4
      molecode_anchor_summary:
        element_and_index_match: 2
      bond_type_summary:
        SINGLE: 1
      edge_count: 1
  - role: aryl_halide
    graph_identity_policy: dft_atom_label_is_primary_atom_id
    representative_component_id: az:aryl_halide:m0121
