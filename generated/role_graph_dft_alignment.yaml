artifact_id: role_graph_dft_alignment_v1
description: Auditable candidate alignment between DFT atom descriptor labels and
  MoleCode nodes grouped by dataset and role. Feature values are not extracted in
  this artifact.
datasets:
- dataset_key: AZ
  roles:
  - role: amine
    molecode_component_count: 203
    parsed_component_count: 203
    representative_component_id: az:amine:m0147
    representative_source_smiles: CN
    representative_molecode_graph: "graph TB\n    %% Original molecule name: az:amine:m0147\n\
      \    subgraph azaminem0147[\"az:amine:m0147\"]\n        azaminem0147_C_1[CH3]\n\
      \        azaminem0147_N_1[NH2]\n\n        azaminem0147_C_1 --- azaminem0147_N_1\n\
      \    end"
    common_atom_summary:
      element_count_ranges:
        C:
          min: 1
          max: 25
        F:
          min: 0
          max: 4
        N:
          min: 1
          max: 5
        O:
          min: 0
          max: 5
        S:
          min: 0
          max: 1
        Si:
          min: 0
          max: 1
      component_count: 203
    role_site_candidates:
    - site_type: AMINE_N
      matching_strategy: SMARTS_OR_MOLECODE_PATTERN
      pattern_hint: '[N;H0,H1,H2,H3;!$(N=*)]'
    - site_type: AMINE_N_H
      matching_strategy: SMARTS_OR_MOLECODE_PATTERN
      pattern_hint: '[N;H1,H2,H3]'
    dft_atom_anchor_map:
    - atom_label: C1
      element: C
      atom_index: 1
      descriptor_columns:
      - amine_.C1_NMR_shift
      - amine_.C1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
      alignment_status: exact_element_singleton
      confidence: high
      reason: Exactly one representative MoleCode node has the same element.
      candidate_molecode_nodes:
      - node_id: azaminem0147_C_1
        component_id: az:amine:m0147
        element: C
        node_index: 1
        display_label: CH3
    - atom_label: N1
      element: N
      atom_index: 1
      descriptor_columns:
      - amine_.N1_NMR_shift
      - amine_.N1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
      alignment_status: exact_element_singleton
      confidence: high
      reason: Exactly one representative MoleCode node has the same element.
      candidate_molecode_nodes:
      - node_id: azaminem0147_N_1
        component_id: az:amine:m0147
        element: N
        node_index: 1
        display_label: NH2
  - role: aryl_halide
    molecode_component_count: 319
    parsed_component_count: 319
    representative_component_id: az:aryl_halide:m0121
    representative_source_smiles: C1=CSC(=C1)Cl
