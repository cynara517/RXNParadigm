artifact_id: dft_atom_variables_v1
description: Atom-level DFT descriptor variables grouped by dataset, role, and atom
  label. Descriptor values are intentionally not extracted here.
datasets:
- dataset_key: AZ
  source_path: datasets/az_no_rdkit.csv
  row_count: 750
  roles:
  - role: amine
    atoms:
    - atom_label: C1
      element: C
      atom_index: 1
      descriptor_columns:
      - amine_.C1_NMR_shift
      - amine_.C1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
    - atom_label: N1
      element: N
      atom_index: 1
      descriptor_columns:
      - amine_.N1_NMR_shift
      - amine_.N1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
  - role: aryl_halide
    atoms:
    - atom_label: C1
      element: C
      atom_index: 1
      descriptor_columns:
      - halide_.C1_NMR_shift
      - halide_.C1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
    - atom_label: C2
      element: C
      atom_index: 2
      descriptor_columns:
      - halide_.C2_NMR_shift
      - halide_.C2_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
  - role: ligand
    atoms:
    - atom_label: P1
      element: P
      atom_index: 1
      descriptor_columns:
      - ligand_.P1_NMR_shift
      - ligand_.P1_electrostatic_charge
      descriptor_names:
      - NMR_shift
      - electrostatic_charge
