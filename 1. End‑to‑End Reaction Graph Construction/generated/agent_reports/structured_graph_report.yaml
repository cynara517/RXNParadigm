artifact_id: reaction_graph_agent_structured_report_v1
interface_contract:
  inputs:
  - 'datasets: mapping of dataset_key to user CSV path'
  - 'llm: optional user LLM API config for evidence/rationale text'
  - 'output_format: currently npz for GNN-readable data'
  llm_boundary: The LLM may explain/retrieve rationale for cross-role relations, but
    it is not allowed to create atom IDs, covalent bonds, cross-role atom edges, or
    adjacency matrices.
llm:
  enabled: false
graph_outputs:
