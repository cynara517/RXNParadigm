name: Publish to PyPI

# Publishes the package to PyPI whenever you push a version tag, e.g.
#   git tag v0.1.1 && git push origin v0.1.1
#
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret is stored.
# One-time setup on PyPI (Project -> Settings -> Publishing -> Add a pending /
# trusted publisher):
#   Owner:            AtomFlow-AI
#   Repository name:  MoleCode
#   Workflow name:    publish.yml
#   Environment name: pypi
# Remember to bump `version` in pyproject.toml before tagging (a version can be
# uploaded to PyPI only once).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/molecode/
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
