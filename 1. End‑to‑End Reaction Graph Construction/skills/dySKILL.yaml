skill_id: dy_buchwald_hartwig_v1
version: 1.0
status: draft
reaction_family: Buchwald-Hartwig amination
dataset_context:
  dataset_key: DY
  description: >
    High-throughput Buchwald-Hartwig C-N cross-coupling reaction dataset.
    Typical components include aryl halides, amines, palladium catalysts,
    ligands, bases, and additives or solvents depending on the dataset.
input_assumption:
  input_type: reaction_smiles_or_makush_smiles
  parsed_by: MoleCode
  user_provides_component_graphs: false

component_classes:
  - class_name: aryl_halide
    description: Aryl or heteroaryl halide electrophile.
    generic_template: Ar-X
    example_roles:
      - electrophile
      - coupling_partner
    site_types:
      - ARYL_C_IPSO
      - LEAVING_GROUP_X

  - class_name: amine
    description: Amine nucleophile.
    generic_template: R-NH2 or R2NH
    example_roles:
      - nucleophile
      - coupling_partner
    site_types:
      - AMINE_N
      - AMINE_N_H

  - class_name: palladium_catalyst
    description: Palladium catalyst or palladium precursor.
    generic_template: Pd or Pd-L complex
    example_roles:
      - metal_catalyst
    site_types:
      - METAL_CENTER

  - class_name: ligand
    description: Ligand coordinating to palladium.
    generic_template: L
    example_roles:
      - ligand
    site_types:
      - LIGAND_DONOR_ATOM
      - LIGAND_STERIC_ENVIRONMENT

  - class_name: base
    description: Base involved in amine activation or HX capture.
    generic_template: Base
    example_roles:
      - base
    site_types:
      - BASE_BASIC_SITE

site_definitions:
  - site_type: ARYL_C_IPSO
    component_class: aryl_halide
    description: Aryl carbon directly bonded to the leaving group.
    matching_strategy: SMARTS_OR_MOLECODE_PATTERN
    pattern_hint: aromatic_or_sp2_carbon_bonded_to_halide_or_pseudohalide
    editable: true

  - site_type: LEAVING_GROUP_X
    component_class: aryl_halide
    description: Halide or pseudohalide leaving group attached to aryl carbon.
    matching_strategy: SMARTS_OR_MOLECODE_PATTERN
    pattern_hint: Cl_Br_I_OTf_or_related_leaving_group
    editable: true

  - site_type: AMINE_N
    component_class: amine
    description: Nitrogen atom of the amine coupling partner.
    matching_strategy: SMARTS_OR_MOLECODE_PATTERN
    pattern_hint: amine_nitrogen
    editable: true

  - site_type: AMINE_N_H
    component_class: amine
    description: N-H bond or hydrogen-bearing amine nitrogen.
    matching_strategy: SMARTS_OR_MOLECODE_PATTERN
    pattern_hint: amine_nitrogen_with_attached_hydrogen
    editable: true

  - site_type: METAL_CENTER
    component_class: palladium_catalyst
    description: Palladium atom or catalytic metal center.
    matching_strategy: ELEMENT_PATTERN
    pattern_hint: Pd
    editable: true

  - site_type: LIGAND_DONOR_ATOM
    component_class: ligand
    description: Donor atom coordinating to palladium, commonly P or N.
    matching_strategy: SMARTS_OR_MOLECODE_PATTERN
    pattern_hint: phosphine_or_nitrogen_donor_atom
    editable: true

  - site_type: BASE_BASIC_SITE
    component_class: base
    description: Basic atom or anionic center capable of proton abstraction or acid neutralization.
    matching_strategy: SMARTS_OR_MOLECODE_PATTERN
    pattern_hint: basic_oxygen_nitrogen_carbonate_phosphate_alkoxide_amide
    editable: true

relation_rules:
  - rule_id: dy_rule_001
    relation_type: BREAKING_BOND
    source_site_type: ARYL_C_IPSO
    target_site_type: LEAVING_GROUP_X
    mechanism_step: oxidative_addition
    description: C-X bond in aryl halide is the bond involved in oxidative addition.
    initial_weight: 0.5
    evidence_policy: mechanism_default
    enabled: true
    editable: true

  - rule_id: dy_rule_002
    relation_type: METAL_COORDINATION
    source_site_type: METAL_CENTER
    target_site_type: ARYL_C_IPSO
    mechanism_step: oxidative_addition
    description: Palladium center interacts with the aryl halide ipso carbon during oxidative addition.
    initial_weight: 0.5
    evidence_policy: literature_supported
    enabled: true
    editable: true

  - rule_id: dy_rule_003
    relation_type: METAL_COORDINATION
    source_site_type: METAL_CENTER
    target_site_type: LEAVING_GROUP_X
    mechanism_step: oxidative_addition
    description: Palladium is associated with the C-X bond cleavage process during oxidative addition.
    initial_weight: 0.5
    evidence_policy: literature_supported
    enabled: true
    editable: true

  - rule_id: dy_rule_004
    relation_type: METAL_COORDINATION
    source_site_type: METAL_CENTER
    target_site_type: LIGAND_DONOR_ATOM
    mechanism_step: catalyst_activation
    description: Ligand donor atom coordinates to palladium and modulates catalytic reactivity.
    initial_weight: 0.5
    evidence_policy: literature_supported
    enabled: true
    editable: true

  - rule_id: dy_rule_005
    relation_type: METAL_COORDINATION
    source_site_type: METAL_CENTER
    target_site_type: AMINE_N
    mechanism_step: amine_coordination
    description: Amine nitrogen may coordinate to palladium before C-N bond formation.
    initial_weight: 0.5
    evidence_policy: literature_supported
    enabled: true
    editable: true

  - rule_id: dy_rule_006
    relation_type: ACID_BASE_INTERACTION
    source_site_type: BASE_BASIC_SITE
    target_site_type: AMINE_N_H
    mechanism_step: amine_activation
    description: Base can assist amine deprotonation or neutralize acid generated during the coupling.
    initial_weight: 0.5
    evidence_policy: literature_supported
    enabled: true
    editable: true

  - rule_id: dy_rule_007
    relation_type: FORMING_BOND
    source_site_type: ARYL_C_IPSO
    target_site_type: AMINE_N
    mechanism_step: reductive_elimination
    description: C-N bond formation connects the aryl ipso carbon and amine nitrogen.
    initial_weight: 0.5
    evidence_policy: mechanism_default
    enabled: true
    editable: true